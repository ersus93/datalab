# DataLab Linting
# Workflow de linting solo en push (sin PR para reducir notificaciones)

name: Lint

on:
  push:
    branches: [main, develop, 'feature/*', 'fix/*']
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/lint.yml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Linting con Ruff
  ruff:
    name: Ruff Linter
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar Ruff
        run: pip install ruff

      - name: Ejecutar Ruff (check)
        if: github.inputs.fix != 'true'
        run: ruff check app/ tests/ --output-format=github

      - name: Ejecutar Ruff (fix)
        if: github.inputs.fix == 'true'
        run: |
          ruff check app/ tests/ --fix --output-format=github
          ruff format app/ tests/ --output-format=github

      - name: Subir cambios si se auto-corrigieron
        if: github.inputs.fix == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix con Ruff"
          file_pattern: "*.py"

  # Formateo con Black
  black:
    name: Black Formatter
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar Black
        run: pip install black

      - name: Verificar formato con Black
        if: github.inputs.fix != 'true'
        run: black --check app/ tests/ --extend-exclude "venv/"

      - name: Formatear con Black
        if: github.inputs.fix == 'true'
        run: black app/ tests/ --extend-exclude "venv/"

      - name: Subir cambios si se formateó
        if: github.inputs.fix == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format con Black"
          file_pattern: "*.py"

  # Verificación de tipos con Mypy
  mypy:
    name: Mypy Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar Mypy y tipos
        run: |
          pip install mypy
          pip install types-python-dateutil types-redis types-setuptools

      - name: Verificar tipos
        run: |
          mypy app/ --ignore-missing-imports --no-error-summary || true

  # Verificación de imports (Python import checker)
  import-check:
    name: Import Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar imports
        run: |
          python -c "from app import create_app; app = create_app('testing'); print('App created successfully')"

  # Verificación de seguridad con pip-audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Verificar vulnerabilidades
        run: pip-audit -r requirements.txt || true
