# DataLab CI - Continuous Integration
# Ejecuta tests y linting en cada push y pull request

name: CI

on:
  push:
    branches: [main, develop, 'feature/*', 'fix/*']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  FLASK_ENV: testing

jobs:
  # Job de linting
  lint:
    name: Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias de desarrollo
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Verificar formato con Black
        run: black --check app/ tests/ --extend-exclude "venv/"

      - name: Verificar código con Ruff
        run: ruff check app/ tests/ --extend-exclude "venv/"

  # Job de tests unitarios
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      # Servicio de PostgreSQL para tests de integración
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_datalab
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-flask pytest-cov pytest-xdist

      - name: Ejecutar tests unitarios
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_datalab
          SECRET_KEY: test-secret-key
        run: |
          pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing -x

      - name: Subir coverage a Codecov (opcional)
        if: success()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: unit-tests

  # Job de tests de integración
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_datalab
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-flask pytest-cov pytest-xdist

      - name: Ejecutar tests de integración
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_datalab
          SECRET_KEY: test-secret-key
        run: |
          pytest tests/integration/ -v --tb=short --cov=app --cov-report=xml -x

  # Job de verificación de seguridad básica
  security:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Verificar vulnerabilidades conocidas
        run: pip-audit -r requirements.txt || true
        # Usar || true para no fallar el workflow si hay vulnerabilidades
        # Revisar manualmente los resultados

  # Job de verificación de tipos (opcional, si se usa mypy)
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-python-dateutil types-redis

      - name: Verificar tipos
        run: |
          mypy app/ --ignore-missing-imports --no-error-summary || true
        # Deshabilitar si no hay anotaciones de tipos completas
